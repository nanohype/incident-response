name: drill

# On-demand resilience drill against a deployed environment. Fires a synthetic
# P1 through the webhook Ingress and asserts the assembler wrote the expected
# audit trail (webhook → SQS → processor → Slack → DynamoDB), without touching
# the customer-visible steps (Statuspage publish, Linear create, channel
# announce, nudge firing). A failure means the assembler or one of its
# dependencies regressed since the last deploy.
#
# What a run needs:
#   secret   AWS_DRILL_ROLE_ARN
#       An IAM role with GitHub OIDC trust (docs/forking-for-a-new-client.md),
#       granting secretsmanager:GetSecretValue on
#       incident-response/<env>/grafana/oncall-webhook-hmac and
#       incident-response/<env>/slack/bot-token, plus
#       dynamodb:GetItem/Query/DeleteItem on incident-response-<env>-*.
#   variable INCIDENT_RESPONSE_DRILL_HOST_{DEVELOPMENT,STAGING,PRODUCTION}
#       Each environment's webhook Ingress hostname — all three of them, not
#       only the one being drilled. A drill signs with
#       incident-response/<env>/grafana/oncall-webhook-hmac, so it has to prove
#       the request is missing the other two environments' load balancers, and
#       an environment nobody names is one nothing can be proved to miss.
#       fire-drill.sh refuses rather than guess.
#
#       An environment whose chart/values-<env>.yaml already names your own
#       hostname needs no variable — the values file establishes it, and a
#       variable that disagrees with it is refused. An environment with no
#       webhook deployment is declared, not omitted: set its variable to `none`.
#
#       There is deliberately no single INCIDENT_RESPONSE_DRILL_HOST. One
#       hostname shared across every environment choice is one signature
#       delivered to another environment's load balancer. fire-drill.sh refuses
#       an unscoped DRILL_WEBHOOK_HOST by name for the same reason.
#   variable INCIDENT_RESPONSE_DRILL_REGION
#       Optional. Defaults to us-west-2, where the landing-zone
#       incident-response-platform component provisions the tables and queues.
#
# Missing configuration fails the run and prints the list above. The drill never
# reports success it did not earn, and never quietly does nothing.
#
# There is no cron. The drill needs a deployed environment, an OIDC role, and a
# hostname — none of which this repository carries, and each fork supplies for
# itself. A schedule here would wake up every night to report its own missing
# configuration, which is no more informative than not running at all. Add a
# `schedule:` trigger below once the three settings above are in place and the
# drill is passing on demand.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to drill
        type: choice
        options:
          - staging
          - production
          - development
        default: staging
      poll_seconds:
        description: Seconds to wait for ROOM_ASSEMBLED before failing
        type: string
        default: '120'

# One drill at a time per environment. Queued runs wait rather than drop —
# a drill that was asked for should happen.
concurrency:
  group: incident-response-drill-${{ github.event.inputs.environment }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  drill:
    name: Drill ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      # fire-drill.sh parses the request URL it assembles with node before it
      # sends anything, in every mode including --check-target. Pin the version
      # rather than lean on whatever the runner image happens to carry.
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      # Whether a drill would fire where it signs is one question with one
      # answer, and `fire-drill.sh --check-target` is where that answer lives: it
      # builds the identity map for every environment, holds the target against
      # it, and exits non-zero with the reason and what to configure. It contacts
      # nothing and needs no credentials, which is why it runs before the role is
      # assumed.
      #
      # This step deliberately re-derives none of it. A preflight that read the
      # repository variables itself would be a second opinion about which host
      # belongs to which environment — and two opinions disagree, which is how a
      # run gets blessed by one and misfired by the other. The AWS role is the
      # only thing checked here, because it is the only requirement the script
      # has no way to see.
      - name: Check the drill is configured, and targets the environment it signs for
        env:
          DRILL_ROLE_ARN: ${{ secrets.AWS_DRILL_ROLE_ARN }}
          ENVIRONMENT: ${{ github.event.inputs.environment }}
          DRILL_WEBHOOK_HOST_DEVELOPMENT: ${{ vars.INCIDENT_RESPONSE_DRILL_HOST_DEVELOPMENT }}
          DRILL_WEBHOOK_HOST_STAGING: ${{ vars.INCIDENT_RESPONSE_DRILL_HOST_STAGING }}
          DRILL_WEBHOOK_HOST_PRODUCTION: ${{ vars.INCIDENT_RESPONSE_DRILL_HOST_PRODUCTION }}
        run: |
          set -uo pipefail
          missing=0

          if [[ -z "$DRILL_ROLE_ARN" ]]; then
            echo "missing: repository secret AWS_DRILL_ROLE_ARN — the IAM role this workflow assumes over GitHub OIDC"
            missing=1
          fi

          bash scripts/fire-drill.sh --env "$ENVIRONMENT" --check-target || missing=1

          if (( missing )); then
            echo
            echo "The drill is not configured for this repository. See the header of .github/workflows/drill.yml."
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DRILL_ROLE_ARN }}
          aws-region: ${{ vars.INCIDENT_RESPONSE_DRILL_REGION || 'us-west-2' }}

      - name: Run the drill
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment }}
          AWS_REGION: ${{ vars.INCIDENT_RESPONSE_DRILL_REGION || 'us-west-2' }}
          DRILL_WEBHOOK_HOST_DEVELOPMENT: ${{ vars.INCIDENT_RESPONSE_DRILL_HOST_DEVELOPMENT }}
          DRILL_WEBHOOK_HOST_STAGING: ${{ vars.INCIDENT_RESPONSE_DRILL_HOST_STAGING }}
          DRILL_WEBHOOK_HOST_PRODUCTION: ${{ vars.INCIDENT_RESPONSE_DRILL_HOST_PRODUCTION }}
          POLL_SEC: ${{ github.event.inputs.poll_seconds }}
        run: bash scripts/ci-drill.sh
