name: drill

# On-demand resilience drill against a deployed environment. Fires a synthetic
# P1 through the webhook Ingress and asserts the assembler wrote the expected
# audit trail (webhook → SQS → processor → Slack → DynamoDB), without touching
# the customer-visible steps (Statuspage publish, Linear create, channel
# announce, nudge firing). A failure means the assembler or one of its
# dependencies regressed since the last deploy.
#
# What a run needs:
#   secret   AWS_DRILL_ROLE_ARN
#       An IAM role with GitHub OIDC trust (docs/forking-for-a-new-client.md),
#       granting secretsmanager:GetSecretValue on
#       incident-response/<env>/grafana/oncall-webhook-hmac and
#       incident-response/<env>/slack/bot-token, plus
#       dynamodb:GetItem/Query/DeleteItem on incident-response-<env>-*.
#   variable INCIDENT_RESPONSE_DRILL_HOST_{DEVELOPMENT,STAGING,PRODUCTION}
#       The webhook Ingress hostname for that one environment. Needed only
#       while that environment's chart/values-<env>.yaml still carries the
#       placeholder host this repository ships; once the values file names your
#       own hostname the drill reads it from there, and a variable that
#       disagrees with it is refused.
#
#       There is deliberately no single INCIDENT_RESPONSE_DRILL_HOST. A drill
#       signs with incident-response/<env>/grafana/oncall-webhook-hmac, so one
#       hostname shared across every environment choice is one signature
#       delivered to another environment's load balancer. fire-drill.sh refuses
#       an unscoped DRILL_WEBHOOK_HOST by name for the same reason.
#   variable INCIDENT_RESPONSE_DRILL_REGION
#       Optional. Defaults to us-west-2, where the landing-zone
#       incident-response-platform component provisions the tables and queues.
#
# Missing configuration fails the run and prints the list above. The drill never
# reports success it did not earn, and never quietly does nothing.
#
# There is no cron. The drill needs a deployed environment, an OIDC role, and a
# hostname — none of which this repository carries, and each fork supplies for
# itself. A schedule here would wake up every night to report its own missing
# configuration, which is no more informative than not running at all. Add a
# `schedule:` trigger below once the three settings above are in place and the
# drill is passing on demand.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to drill
        type: choice
        options:
          - staging
          - production
          - development
        default: staging
      poll_seconds:
        description: Seconds to wait for ROOM_ASSEMBLED before failing
        type: string
        default: '120'

# One drill at a time per environment. Queued runs wait rather than drop —
# a drill that was asked for should happen.
concurrency:
  group: incident-response-drill-${{ github.event.inputs.environment }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  drill:
    name: Drill ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      # Two questions, deliberately asked in two ways.
      #
      # "Is the drill configured" is fire-drill.sh's own question, and --dry-run
      # answers it without contacting anything or needing credentials.
      #
      # "Does it target the environment it signs for" cannot be delegated to the
      # same resolver, because a resolver that got the target wrong would report
      # the wrong target as a success. So this step derives the expected host
      # itself — the environment-scoped variable, else ingress.host straight out
      # of that environment's values file — and compares it against what
      # --print-host actually resolved. It then checks the resolved host against
      # every *other* environment's host, derived the same independent way. A
      # production dispatch that would reach staging fails here even if the
      # script's own checks did not fire.
      #
      # What this step does NOT restate is how two hostnames are compared. A port,
      # a path, letter case or a trailing root dot can differ between two strings
      # naming the same load balancer, and a second implementation of that rule in
      # YAML is a second implementation to drift. So the comparison form comes
      # from `fire-drill.sh --canonical-host`, the same primitive the script's own
      # checks use. Reading configuration stays independent; agreeing on what a
      # hostname is does not.
      - name: Check the drill is configured, and targets the environment it signs for
        env:
          DRILL_ROLE_ARN: ${{ secrets.AWS_DRILL_ROLE_ARN }}
          ENVIRONMENT: ${{ github.event.inputs.environment }}
          DRILL_WEBHOOK_HOST_DEVELOPMENT: ${{ vars.INCIDENT_RESPONSE_DRILL_HOST_DEVELOPMENT }}
          DRILL_WEBHOOK_HOST_STAGING: ${{ vars.INCIDENT_RESPONSE_DRILL_HOST_STAGING }}
          DRILL_WEBHOOK_HOST_PRODUCTION: ${{ vars.INCIDENT_RESPONSE_DRILL_HOST_PRODUCTION }}
        run: |
          set -uo pipefail
          missing=0

          if [[ -z "$DRILL_ROLE_ARN" ]]; then
            echo "missing: repository secret AWS_DRILL_ROLE_ARN — the IAM role this workflow assumes over GitHub OIDC"
            missing=1
          fi

          upper() { printf '%s' "$1" | tr '[:lower:]' '[:upper:]'; }

          # The comparison form of a hostname, asked of the drill rather than
          # reimplemented here. Prints nothing for the placeholder this
          # repository ships, which is how "not configured" is spelled below.
          canonical() { bash scripts/fire-drill.sh --canonical-host "$1"; }

          # This environment's host, without going through fire-drill.sh's own
          # resolver: the scoped repository variable if set, else ingress.host as
          # the values file declares it.
          configured_host() {
            local env="$1" var raw
            var="DRILL_WEBHOOK_HOST_$(upper "$env")"
            raw="${!var:-}"
            if [[ -z "$raw" && -f "chart/values-${env}.yaml" ]]; then
              raw=$(awk '
                /^[^ \t#]/ { inblock = ($0 == "ingress:") }
                inblock && index($0, "  host:") == 1 {
                  sub("^  host:[ \t]*", ""); sub("[ \t]+#.*$", ""); sub("[ \t]+$", "")
                  gsub("[\"'\'']", ""); print; exit
                }' "chart/values-${env}.yaml")
            fi
            canonical "$raw"
          }

          ENV_UPPER=$(upper "$ENVIRONMENT")

          if ! bash scripts/fire-drill.sh --env "$ENVIRONMENT" --dry-run >/dev/null; then
            echo "missing: a webhook target for $ENVIRONMENT — set repository variable INCIDENT_RESPONSE_DRILL_HOST_${ENV_UPPER}, or put the real hostname in chart/values-${ENVIRONMENT}.yaml"
            missing=1
          fi

          resolved=$(bash scripts/fire-drill.sh --env "$ENVIRONMENT" --print-host 2>/dev/null) || resolved=""
          expected=$(configured_host "$ENVIRONMENT")

          if [[ -z "$resolved" ]]; then
            echo "unresolved: the drill could not name a webhook host for $ENVIRONMENT"
            missing=1
          elif [[ -z "$expected" ]]; then
            echo "unconfigured: nothing in this repository declares a $ENVIRONMENT webhook host, yet the drill resolved '$resolved'"
            missing=1
          elif [[ "$resolved" != "$expected" ]]; then
            echo "target mismatch: a $ENVIRONMENT drill signs with incident-response/${ENVIRONMENT}/grafana/oncall-webhook-hmac"
            echo "  configured host: $expected"
            echo "  resolved host:   $resolved"
            missing=1
          fi

          for other in development staging production; do
            [[ "$other" == "$ENVIRONMENT" ]] && continue
            other_host=$(configured_host "$other")
            if [[ -n "$other_host" && -n "$resolved" && "$resolved" == "$other_host" ]]; then
              echo "cross-environment target: a $ENVIRONMENT drill would deliver a $ENVIRONMENT-signed alert to the $other webhook host '$resolved'"
              missing=1
            fi
          done

          if (( missing )); then
            echo
            echo "The drill is not configured for this repository. See the header of .github/workflows/drill.yml."
            exit 1
          fi
          echo "drill configuration present — $ENVIRONMENT signs for and targets $resolved"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DRILL_ROLE_ARN }}
          aws-region: ${{ vars.INCIDENT_RESPONSE_DRILL_REGION || 'us-west-2' }}

      - name: Run the drill
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment }}
          AWS_REGION: ${{ vars.INCIDENT_RESPONSE_DRILL_REGION || 'us-west-2' }}
          DRILL_WEBHOOK_HOST_DEVELOPMENT: ${{ vars.INCIDENT_RESPONSE_DRILL_HOST_DEVELOPMENT }}
          DRILL_WEBHOOK_HOST_STAGING: ${{ vars.INCIDENT_RESPONSE_DRILL_HOST_STAGING }}
          DRILL_WEBHOOK_HOST_PRODUCTION: ${{ vars.INCIDENT_RESPONSE_DRILL_HOST_PRODUCTION }}
          POLL_SEC: ${{ github.event.inputs.poll_seconds }}
        run: bash scripts/ci-drill.sh
