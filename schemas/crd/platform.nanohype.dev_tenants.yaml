---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: tenants.platform.nanohype.dev
spec:
  group: platform.nanohype.dev
  names:
    kind: Tenant
    listKind: TenantList
    plural: tenants
    shortNames:
    - tnt
    singular: tenant
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.primaryPersona
      name: Persona
      type: string
    - jsonPath: .status.platformCount
      name: Platforms
      type: integer
    - jsonPath: .status.readyPlatformCount
      name: Ready
      type: integer
    - jsonPath: .status.suspendedPlatformCount
      name: Suspended
      type: integer
    - jsonPath: .status.aggregateSpendUsd
      name: Spend
      type: string
    - jsonPath: .status.percentOfBudget
      name: Pct
      type: integer
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Tenant is the cluster-scoped organizational owner of one or more
          Platforms. Provides aggregate budget / readiness / suspension views and
          a single point for non-technical persona dashboards to land on.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              TenantSpec describes an organization (or sub-org) that owns one or more
              Platforms. Tenant is cluster-scoped — it doesn't represent a Kubernetes
              namespace; it represents an organizational boundary that crosses
              Platforms. The relationship to Platform is by `Platform.spec.tenant`
              referencing `Tenant.metadata.name`.
            properties:
              aggregateMonthlyBudgetUsd:
                description: |-
                  AggregateMonthlyBudgetUsd is the soft cap on the SUM of all owned
                  Platforms' BudgetPolicy.spec.monthlyUsd. Status reports whether the
                  sum exceeds this; the operator does not enforce — each Platform's
                  own BudgetPolicy is the enforcement layer. Modeled as a decimal-
                  string to mirror BudgetPolicy.monthlyUsd.
                pattern: ^[0-9]+(\.[0-9]{1,2})?$
                type: string
              compliance:
                description: |-
                  Compliance baseline applied to every Platform owned by this Tenant
                  unless the Platform itself sets a stricter value.
                properties:
                  hipaa:
                    description: |-
                      HIPAA: object-lock compliance mode, no cross-region inference, PII detect
                      required on Guardrails.
                    type: boolean
                  soc2:
                    description: 'SOC2: invocation logging required, kill-switch enabled.'
                    type: boolean
                type: object
              contact:
                description: |-
                  Contact carries human-readable owner info (Slack channel, on-call
                  rotation, billing email) for ops to reach.
                properties:
                  billingEmail:
                    description: BillingEmail — invoice + budget-breach notification
                      recipient.
                    type: string
                  oncallRotation:
                    description: OncallRotation — Pagerduty schedule key or similar
                      identifier.
                    type: string
                  slackChannel:
                    description: SlackChannel for tenant-wide notifications (e.g.
                      "#acme-ops").
                    type: string
                type: object
              displayName:
                description: |-
                  DisplayName is the human-readable tenant name shown in dashboards
                  and persona UX.
                type: string
              primaryPersona:
                default: generic
                description: |-
                  PrimaryPersona drives default values for new Platforms onboarded
                  into this tenant. One of the standard persona names.
                enum:
                - sales-ops
                - support
                - finance
                - ops
                - founder
                - eng
                - marketing
                - legal
                - generic
                type: string
            required:
            - primaryPersona
            type: object
          status:
            description: TenantStatus aggregates the state of Platforms owned by this
              Tenant.
            properties:
              aggregateBudgetUsd:
                description: |-
                  AggregateBudgetUsd is the sum of MonthlyUsd across all owned
                  BudgetPolicies.
                type: string
              aggregateSpendUsd:
                description: |-
                  AggregateSpendUsd is the sum of CurrentSpendUsd across all owned
                  BudgetPolicies (one per owned Platform).
                type: string
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastReconciled:
                description: LastReconciled timestamp.
                format: date-time
                type: string
              percentOfBudget:
                description: |-
                  PercentOfBudget — 0..200+. Computed from AggregateSpend /
                  AggregateBudget. When > 100 a TenantBudgetExceeded condition fires.
                format: int32
                type: integer
              phase:
                description: |-
                  Phase: Pending, Active, Suspended (any owned Platform suspended),
                  Failed.
                type: string
              platformCount:
                description: |-
                  PlatformCount is the number of Platform CRs whose
                  spec.tenant == Tenant.metadata.name.
                format: int32
                type: integer
              readyPlatformCount:
                description: ReadyPlatformCount is the subset of PlatformCount in
                  phase=Ready.
                format: int32
                type: integer
              suspendedPlatformCount:
                description: SuspendedPlatformCount is the subset in phase=Suspended.
                format: int32
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
