---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: budgetpolicies.governance.nanohype.dev
spec:
  group: governance.nanohype.dev
  names:
    kind: BudgetPolicy
    listKind: BudgetPolicyList
    plural: budgetpolicies
    shortNames:
    - budget
    singular: budgetpolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.platformRef.name
      name: Platform
      type: string
    - jsonPath: .spec.monthlyUsd
      name: MonthlyUSD
      type: string
    - jsonPath: .status.currentSpendUsd
      name: Spend
      type: string
    - jsonPath: .status.percentOfBudget
      name: Pct
      type: integer
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: BudgetPolicy caps monthly spend per Platform and triggers the
          kill-switch at 120% of the threshold.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: BudgetPolicySpec sets monthly spend caps per Platform.
            properties:
              alertThresholdsPercent:
                default:
                - 50
                - 80
                - 100
                description: AlertThresholdsPercent — fire WarnEvent at these % of
                  the threshold.
                items:
                  format: int32
                  type: integer
                type: array
              killSwitchEnabled:
                default: true
                description: |-
                  KillSwitchEnabled — when false, breach at 120% is logged but not acted on.
                  Use sparingly; SOC2 platforms must keep this true.
                type: boolean
              monthlyUsd:
                description: |-
                  MonthlyUsd is the soft threshold expressed as a decimal-string USD amount
                  (e.g. "2500", "1500.50"). KillSwitch fires at 120% of this. Modeled as
                  string for symmetry with Status.CurrentSpendUsd and so future v1 can
                  support fractional cents without a lossy int32 → string conversion. The
                  pattern enforces non-negative decimal with optional 2-digit fraction.
                minLength: 1
                pattern: ^[0-9]+(\.[0-9]{1,2})?$
                type: string
              platformRef:
                description: LocalRef references a CR by name in the same namespace.
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
            required:
            - killSwitchEnabled
            - monthlyUsd
            - platformRef
            type: object
          status:
            description: |-
              BudgetPolicyStatus surfaces the latest spend reading. The budget reconciler
              updates this on every tick (hourly in prod, 5m in dev) with current spend,
              percent-of-budget, the alert thresholds crossed, and reconcile conditions.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              currentSpendUsd:
                description: CurrentSpendUsd is the most recent spend snapshot.
                type: string
              killSwitchFiredAt:
                description: |-
                  KillSwitchFiredAt — non-null once the kill-switch has published a
                  breach event. Firing is not the same as taking effect: the platform is
                  suspended by an out-of-band EventBridge→StepFunctions path, and the
                  reconciler confirms the effect (platform observed Suspended) before it
                  treats the switch as done. See KillSwitchRefireCount and the
                  KillSwitchUnrouted condition.
                format: date-time
                type: string
              killSwitchLastRefireAt:
                description: |-
                  KillSwitchLastRefireAt is the timestamp of the most recent re-publish.
                  It anchors the exponential backoff between re-fires.
                format: date-time
                type: string
              killSwitchRefireCount:
                description: |-
                  KillSwitchRefireCount is how many times the breach event has been
                  re-published because the platform was not observed Suspended within the
                  grace window. Bounded — after the cap the reconciler stops re-publishing
                  but keeps the KillSwitchUnrouted condition set so the alert stays lit.
                format: int32
                type: integer
              lastReconciled:
                description: LastReconciled timestamp.
                format: date-time
                type: string
              percentOfBudget:
                description: PercentOfBudget — 0..200+.
                format: int32
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
