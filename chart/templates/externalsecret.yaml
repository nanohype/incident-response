{{- if .Values.externalSecret.enabled -}}
# Aggregates two AWS Secrets Manager entries into one k8s Secret consumed by
# webhook + processor via envFrom:
#   - incident-response/<env>/grafana-oncall-hmac  → the Grafana OnCall webhook HMAC key
#   - incident-response/<env>/app-secrets          → Slack, Grafana Cloud read, Statuspage, Linear, WorkOS
#
# The HMAC secret has its own AWS entry because the webhook handler caches it
# keyed on VersionId (src/handlers/webhook-ingress.ts); we pull only its current
# value here, and the env var GRAFANA_ONCALL_HMAC_SECRET_ID (set on the webhook
# Deployment) is what drives the cache-by-version refresh path.
#
# No OTLP credential here. Both Deployments export to
# alloy.monitoring.svc.cluster.local:4318, the in-cluster Grafana Alloy receiver
# eks-gitops installs, which authenticates nothing on its OTLP port — Alloy owns
# the only upstream credential in the chain, signing remote-writes to Amazon
# Managed Prometheus with its own EKS Pod Identity, and Tempo and Loki are
# in-cluster too. Nothing downstream of these pods would read an Authorization
# header, so projecting one into the pod spec buys no access and puts a
# plaintext credential where anything with `get pod` in the namespace can read
# it. The one case that does need a credential — repointing
# OTEL_EXPORTER_OTLP_ENDPOINT at an authenticated gateway — is served by
# src/handlers/webhook-otel-init.ts, which resolves
# incident-response/<env>/grafana-cloud/otlp-auth through the pod's own
# GetSecretValue grant and sets the header programmatically.

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "tenant-chart-base.fullname" . }}-secrets
  labels:
    {{- include "tenant-chart-base.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStore }}
    kind: ClusterSecretStore
  target:
    name: {{ include "tenant-chart-base.fullname" . }}-secrets
    creationPolicy: Owner
  data:
    # App-secrets bundle — Slack tokens + Linear + Grafana + Statuspage + WorkOS
    - secretKey: SLACK_BOT_TOKEN
      remoteRef:
        key: {{ .Values.externalSecret.appSecret }}
        property: SLACK_BOT_TOKEN
    - secretKey: SLACK_SIGNING_SECRET
      remoteRef:
        key: {{ .Values.externalSecret.appSecret }}
        property: SLACK_SIGNING_SECRET
    - secretKey: GRAFANA_ONCALL_TOKEN
      remoteRef:
        key: {{ .Values.externalSecret.appSecret }}
        property: GRAFANA_ONCALL_TOKEN
    - secretKey: GRAFANA_CLOUD_TOKEN
      remoteRef:
        key: {{ .Values.externalSecret.appSecret }}
        property: GRAFANA_CLOUD_TOKEN
    - secretKey: GRAFANA_CLOUD_ORG_ID
      remoteRef:
        key: {{ .Values.externalSecret.appSecret }}
        property: GRAFANA_CLOUD_ORG_ID
    - secretKey: STATUSPAGE_API_KEY
      remoteRef:
        key: {{ .Values.externalSecret.appSecret }}
        property: STATUSPAGE_API_KEY
    - secretKey: STATUSPAGE_PAGE_ID
      remoteRef:
        key: {{ .Values.externalSecret.appSecret }}
        property: STATUSPAGE_PAGE_ID
    - secretKey: LINEAR_API_KEY
      remoteRef:
        key: {{ .Values.externalSecret.appSecret }}
        property: LINEAR_API_KEY
    - secretKey: LINEAR_PROJECT_ID
      remoteRef:
        key: {{ .Values.externalSecret.appSecret }}
        property: LINEAR_PROJECT_ID
    - secretKey: LINEAR_TEAM_ID
      remoteRef:
        key: {{ .Values.externalSecret.appSecret }}
        property: LINEAR_TEAM_ID
    - secretKey: WORKOS_API_KEY
      remoteRef:
        key: {{ .Values.externalSecret.appSecret }}
        property: WORKOS_API_KEY
{{- end }}
