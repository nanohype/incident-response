{{- if .Values.externalSecret.enabled -}}
{{- $prefix := .Values.externalSecret.secretPrefix -}}
# Projects this environment's AWS Secrets Manager tree into one k8s Secret the
# webhook + processor consume via envFrom.
#
# One remoteRef per integration, each at `externalSecret.secretPrefix` plus the
# suffix in `externalSecret.keys`. Those suffixes are the paths
# scripts/seed-secrets.sh writes and secrets.template.json declares; the
# secret-path parity gate in .github/workflows/ci.yml renders this template and
# fails the build if any path here is one the seeder does not create. Secrets
# stay one-per-integration rather than a single bundle because they rotate on
# separate cadences (docs/secrets.md) and Secrets Manager versions the whole
# payload — a bundle would make every rotation a rewrite of every credential.
#
# Two secrets under the same prefix are deliberately absent from this list:
#
#   grafana/oncall-webhook-hmac  The webhook handler fetches it through the
#     pod's own GetSecretValue grant and caches it keyed on VersionId
#     (src/handlers/webhook-ingress.ts), so rotation takes effect without a pod
#     restart. Projecting it would pin the value to the refreshInterval below
#     and defeat that. The chart passes its id instead, as
#     GRAFANA_ONCALL_HMAC_SECRET_ID on the webhook Deployment.
#
#   grafana-cloud/otlp-auth  Nothing reads it on the default export path. Both
#     Deployments export to telemetry.monitoring.svc.cluster.local:4318, the
#     in-cluster OpenTelemetry Collector gateway eks-gitops installs, which authenticates
#     nothing on its OTLP port — the gateway owns the only upstream credential in the
#     chain, signing remote-writes to Amazon Managed Prometheus with its own EKS
#     Pod Identity, and Tempo and Loki are in-cluster too. Nothing downstream of
#     these pods would read an Authorization header, so projecting one buys no
#     access and puts a plaintext credential where anything with `get pod` in
#     the namespace can read it. The one case that does need it — repointing
#     OTEL_EXPORTER_OTLP_ENDPOINT at an authenticated gateway — is served by
#     src/handlers/webhook-otel-init.ts, which resolves the secret through the
#     same pod grant and sets the header programmatically.

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "tenant-chart-base.fullname" . }}-secrets
  labels:
    {{- include "tenant-chart-base.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStore }}
    kind: ClusterSecretStore
  target:
    name: {{ include "tenant-chart-base.fullname" . }}-secrets
    creationPolicy: Owner
  data:
    {{- range $envVar, $path := .Values.externalSecret.keys }}
    - secretKey: {{ $envVar }}
      remoteRef:
        key: {{ printf "%s/%s" $prefix $path | quote }}
    {{- end }}
{{- end }}
