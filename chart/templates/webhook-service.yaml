{{- if .Values.webhook.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tenant-chart-base.fullname" . }}-webhook
  labels:
    {{- include "tenant-chart-base.labels" . | nindent 4 }}
    incident-response.io/service: webhook
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.webhook.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "incident-response.selectorLabels" (dict "Values" .Values "Release" .Release "Chart" .Chart "service" "webhook") | nindent 4 }}
{{- end }}
