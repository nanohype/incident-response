{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "tenant-chart-base.fullname" . }}
  labels:
    {{- include "tenant-chart-base.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/name: {{ include "tenant-chart-base.name" . }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Webhook accepts from the load balancer only — Grafana OnCall (HMAC) plus
    # the signed-HTTP Slack slash + interactivity Request URLs all land on the
    # webhook listening port via the ALB the Ingress provisions.
    #
    # The ALB is not a pod, so this cannot be a namespaceSelector: with
    # target-type ip the connection arrives from an ALB network interface in the
    # cluster VPC, and the source is a VPC address. 10.0.0.0/8 is the range the
    # landing-zone network component allocates VPC CIDRs from; narrow it to the
    # public subnet CIDRs per-env where the blast radius matters.
    - from:
        - ipBlock:
            cidr: 10.0.0.0/8
      ports:
        - protocol: TCP
          port: {{ .Values.webhook.port }}
    {{- if .Values.mcp.enabled }}
    # MCP pull surface: reachable ONLY from the mcp-tunnel namespace. The
    # mcp-tunnel (outbound-only cloudflared) is the single ingress to the
    # processor's MCP port — every other source stays default-deny. This is what
    # makes the read + draft surface tunnel-ready without any public ingress.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: mcp-tunnel
      ports:
        - protocol: TCP
          port: {{ .Values.processor.mcpPort }}
    {{- end }}
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
        - podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
    # HTTPS — AWS APIs (DynamoDB, SQS, Bedrock, Secrets Manager, Scheduler,
    # CloudWatch), Slack (WebSocket + REST), Grafana Cloud OnCall + Mimir,
    # Linear, Statuspage, WorkOS
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.0.0/16
      ports:
        - protocol: TCP
          port: 443
    # OTLP traces + metrics + logs to the OpenTelemetry Collector gateway in the
    # monitoring namespace (telemetry.monitoring.svc.cluster.local:4318).
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 4318
{{- end }}
