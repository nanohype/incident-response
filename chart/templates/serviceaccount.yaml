{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "marshal.serviceAccountName" . }}
  labels:
    {{- include "marshal.labels" . | nindent 4 }}
  # Both workloads (webhook + processor) share one ServiceAccount. The IRSA
  # role is provisioned by landing-zone's marshal-platform component — the
  # role's trust policy permits assumption by this SA in this namespace, and
  # its inline policy bundles every action both pods need (DDB rw, SQS rw,
  # Bedrock invoke, EventBridge Scheduler crud, Secrets Manager read,
  # CloudWatch PutMetricData). The role ARN is the component's
  # `irsa_role_arn` output; per-env values plumb it into
  # `aws.platformRoleArn`, and the annotation below picks it up.
  {{- if or .Values.aws.platformRoleArn .Values.serviceAccount.annotations }}
  annotations:
    {{- if .Values.aws.platformRoleArn }}
    eks.amazonaws.com/role-arn: {{ .Values.aws.platformRoleArn | quote }}
    {{- end }}
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
{{- end }}
