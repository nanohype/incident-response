{{- if .Values.prometheusRule.enabled -}}
# The three SLO + reliability rules. Rendered only when
# `prometheusRule.enabled` is true, which it is not by default: eks-gitops
# installs the prometheus-operator CRDs but runs no Prometheus operator, so on
# that stack this CR would apply and then sit inert. A cluster that does run one
# picks these up through prometheus.spec.ruleSelector — set
# `prometheusRule.selector` if its selector differs from the release label.
#
# The PromQL targets OTel metric names as the collector's Prometheus exporter emits
# them: the `incident_response.` namespace and the `.` separators become
# underscores, and counters gain a `_total` suffix.

apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "tenant-chart-base.fullname" . }}
  labels:
    {{- include "tenant-chart-base.labels" . | nindent 4 }}
    {{- with .Values.prometheusRule.selector }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    - name: incident-response.slo
      interval: 1m
      rules:
        - alert: IncidentResponseAssemblyDurationBreach
          expr: histogram_quantile(0.99, sum by (le) (rate(incident_response_assembly_duration_ms_bucket[5m]))) > 300000
          for: 10m
          labels:
            severity: page
            service: incident-response
            slo: assembly-under-5min
          annotations:
            summary: IncidentResponse P99 war-room assembly exceeds 5-minute SLO
            description: |
              P99 assembly duration over the last 5 minutes is {{ "{{" }} $value | printf "%.0f" {{ "}}" }} ms (>300000 ms).
              Runbook: artifacts/runbook.md § "SLO breach — assembly latency"

        - alert: IncidentResponseDirectoryLookupFailureSpike
          expr: sum(rate(incident_response_directory_lookup_failure_count_total[5m])) > 0.1
          for: 5m
          labels:
            severity: warn
            service: incident-response
          annotations:
            summary: IncidentResponse directory lookup failures spiking
            description: |
              Directory (WorkOS) lookup failures exceed 0.1/s over the last 5 minutes.
              Incidents will assemble with empty responder lists until resolved.
              Runbook: artifacts/runbook.md § "Directory lookup degraded"

        - alert: IncidentResponseStatuspagePublishFailures
          expr: sum(rate(incident_response_statuspage_publish_count_total{outcome="failed"}[5m])) > 0
          for: 2m
          labels:
            severity: page
            service: incident-response
          annotations:
            summary: IncidentResponse failed to publish Statuspage.io updates
            description: |
              Statuspage.io publish failures in the last 5 minutes.
              IC approvals are stuck; customer communications not going out.
              Runbook: artifacts/runbook.md § "Statuspage.io publish failures"
{{- end }}
