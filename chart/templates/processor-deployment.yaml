{{- if .Values.processor.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tenant-chart-base.fullname" . }}-processor
  labels:
    {{- include "tenant-chart-base.labels" . | nindent 4 }}
    incident-response.io/service: processor
spec:
  replicas: {{ .Values.processor.replicaCount }}
  # Recreate (not RollingUpdate) — the processor is a single-writer singleton
  # (SQS consumer + stateful war-room assembly); brief downtime during deploys
  # is preferable to two processors briefly running and dispatching the same
  # incident event twice.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "incident-response.selectorLabels" (dict "Values" .Values "Release" .Release "Chart" .Chart "service" "processor") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tenant-chart-base.labels" . | nindent 8 }}
        incident-response.io/service: processor
      annotations:
        # Rolls the pods whenever the ExternalSecret's inputs move — the secret
        # prefix, the projected key list, or the refresh interval. Hashing the
        # whole block means a new remoteRef cannot be added without a restart.
        checksum/external-secret: {{ .Values.externalSecret | toYaml | sha256sum }}
    spec:
      serviceAccountName: {{ include "tenant-chart-base.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: 60   # drain in-flight SQS messages
      containers:
        - name: processor
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: {{ .Values.processor.command }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.processor.port }}
              protocol: TCP
            # MCP streamable-HTTP server (env MCP_PORT). The mcp-tunnel routes
            # here; the NetworkPolicy locks it to the mcp-tunnel namespace.
            - name: mcp
              containerPort: {{ .Values.processor.mcpPort }}
              protocol: TCP
          env:
            {{- include "incident-response.env" (dict "Values" .Values "service" "processor") | nindent 12 }}
            - name: OTEL_SERVICE_NAME
              value: incident-response-processor
          envFrom:
            - secretRef:
                name: {{ include "tenant-chart-base.fullname" . }}-secrets
          livenessProbe:
            {{- toYaml .Values.probes.processor.liveness | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.probes.processor.readiness | nindent 12 }}
          resources:
            {{- toYaml .Values.processor.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
