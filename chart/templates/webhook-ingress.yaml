{{- if and .Values.ingress.enabled .Values.webhook.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "tenant-chart-base.fullname" . }}-webhook
  labels:
    {{- include "tenant-chart-base.labels" . | nindent 4 }}
    incident-response.io/service: webhook
  annotations:
    {{- if .Values.ingress.tls.enabled }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tls.issuer | quote }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ include "tenant-chart-base.fullname" . }}-webhook-tls
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: {{ .Values.ingress.path }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "tenant-chart-base.fullname" . }}-webhook
                port:
                  number: {{ .Values.webhook.port }}
{{- end }}
