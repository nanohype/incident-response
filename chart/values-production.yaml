# Production delta.
image:
  tag: production

webhook:
  replicaCount: 3

processor:
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi

ingress:
  host: marshal-webhook.example.com

externalSecret:
  hmacSecret: marshal/production/grafana-oncall-hmac
  appSecret: marshal/production/app-secrets
  grafanaCloudSecret: marshal/production/grafana-cloud

env:
  OTEL_RESOURCE_ATTRIBUTES: "service.namespace=marshal,service.version=0.1.0,deployment.environment=production,agents.tenant=protohype,agents.platform=marshal"

aws:
  # Fill from landing-zone `marshal-platform` (production) output: irsa_role_arn.
  # `cd live/aws/workload-prod/us-west-2/production/marshal-platform && tofu output -raw irsa_role_arn`
  platformRoleArn: ""

tenantInfra:
  # Fill the empties below from the landing-zone marshal-platform production
  # outputs (terragrunt output -json). Slot names match output names 1:1.
  incidentsTableName: marshal-incidents-production
  auditTableName: marshal-audit-production
  identityCacheTableName: ""    # output: identity_cache_table_name
  incidentEventsQueueUrl: ""
  nudgeEventsQueueUrl: ""
  nudgeEventsQueueArn: ""
  slaCheckQueueUrl: ""
  schedulerRoleArn: ""
  schedulerGroupName: marshal-nudges-production
  auditBucketName: ""           # output: audit_bucket_name
