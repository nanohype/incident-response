# Production delta.
image:
  tag: production

webhook:
  replicaCount: 3

processor:
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi

ingress:
  host: incident-response-webhook.example.com

externalSecret:
  hmacSecret: incident-response/production/grafana-oncall-hmac
  appSecret: incident-response/production/app-secrets
  grafanaCloudSecret: incident-response/production/grafana-cloud

env:
  OTEL_RESOURCE_ATTRIBUTES: 'service.namespace=incident-response,service.version=0.1.0,deployment.environment=production,agents.tenant=protohype,agents.platform=incident-response'

tenantInfra:
  # Fill the empties below from the landing-zone incident-response-platform production
  # outputs (terragrunt output -json). Slot names match output names 1:1.
  incidentsTableName: incident-response-production-incidents
  auditTableName: incident-response-production-audit
  identityCacheTableName: '' # output: identity_cache_table_name
  incidentEventsQueueUrl: ''
  nudgeEventsQueueUrl: ''
  nudgeEventsQueueArn: ''
  slaCheckQueueUrl: ''
  schedulerRoleArn: ''
  schedulerGroupName: incident-response-production-nudges
  auditBucketName: '' # output: audit_bucket_name
