# Base values for incident-response (all environments). Per-env deltas in values-{staging,production}.yaml.
#
# Two workloads in one chart:
#   - webhook   (Deployment, public ingress) — Grafana OnCall HMAC verifier + SQS enqueue,
#                                              and the signed-HTTP Slack slash + interactivity endpoints
#   - processor (Deployment, MCP Service)    — SQS consumer + war-room assembler + in-process MCP server
# Plus an MCP Service, a PrometheusRule, and a Grafana dashboard ConfigMap.

image:
  repository: ghcr.io/nanohype/incident-response
  tag: ''
  pullPolicy: IfNotPresent

serviceAccount:
  # The operator creates and owns the `tenant-runtime` ServiceAccount and binds
  # it to the `<env>-incident-response-tenant` role via an EKS Pod Identity
  # association, so the pod runs as it with no role-arn annotation and the chart
  # carries no AWS account values. The chart references that SA rather than
  # minting its own.
  create: false
  name: tenant-runtime
  # Free-form additional annotations to merge into the ServiceAccount.
  annotations: {}

# Resource attributes the shared chart labels read (tenant-chart-base.labels →
# agents.nanohype.dev/{tenant,platform}). The OTEL_RESOURCE_ATTRIBUTES env var
# carries the same values into the app's OTel SDK at runtime.
otel:
  resourceAttributes:
    agents.tenant: reliability
    agents.platform: incident-response

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

webhook:
  enabled: true
  replicaCount: 2 # public-facing — keep two for rolling restarts
  port: 3001
  command: ['node', '--enable-source-maps', 'dist/bin/webhook-server.js']
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

processor:
  enabled: true
  replicaCount: 1 # single-writer singleton (SQS consumer + assembler + in-process MCP server)
  port: 3001
  # MCP streamable-HTTP port — the read + draft pull surface the mcp-tunnel
  # routes to. Distinct from `port` (health) to avoid a collision. Locked to the
  # mcp-tunnel namespace by the NetworkPolicy.
  mcpPort: 3002
  command: ['node', '--enable-source-maps', 'dist/index.js']
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# MCP pull surface (read + draft). A ClusterIP Service in front of the processor
# pod's MCP port; the mcp-tunnel is the only thing allowed to reach it (see
# networkPolicy below). No public ingress, no LoadBalancer.
mcp:
  enabled: true
  # Service port the mcp-tunnel dials; targets the processor's mcpPort.
  port: 3002

probes:
  webhook:
    liveness:
      httpGet:
        path: /health
        port: 3001
      initialDelaySeconds: 10
      periodSeconds: 30
    readiness:
      httpGet:
        path: /health
        port: 3001
      initialDelaySeconds: 5
      periodSeconds: 10
  processor:
    liveness:
      httpGet:
        path: /health
        port: 3001
      initialDelaySeconds: 30 # allow the MCP server + SQS consumer to come up
      periodSeconds: 30
      failureThreshold: 5
    readiness:
      httpGet:
        path: /health
        port: 3001
      initialDelaySeconds: 10
      periodSeconds: 10

# Public HTTP surface for the webhook Deployment. Grafana OnCall and Slack call
# these routes from the internet, so this Ingress is load-bearing — the incident
# flow has no other entry point.
#
# The eks-gitops catalog's ingress implementation is the AWS Load Balancer
# Controller (addons/networking/aws-load-balancer-controller). It creates an
# `alb` IngressClass and does not mark it the cluster default, so the class is
# named explicitly here. external-dns runs with `sources: [service, ingress]`
# and publishes a Route53 record for `host` off this object. On a cluster
# participating in a VPC it does not own, the Kyverno `inject-adopt-lb-subnets`
# policy fills in the subnet annotation from the scheme set below.
ingress:
  enabled: true
  className: alb
  # internal | internet-facing. The controller defaults to internal when unset;
  # these routes are called from outside the VPC, so say so.
  scheme: internet-facing
  # Cilium runs ENI IPAM with native routing, so pod IPs are VPC IPs and the ALB
  # registers pods directly. Instance targets would need a NodePort Service.
  targetType: ip
  tls:
    enabled: true
    # ACM certificate for `host`. Left empty, the controller discovers a
    # certificate in ACM whose domain matches the host on the rule below. TLS
    # terminates at the ALB — there is no in-cluster certificate and no Secret.
    certificateArn: ''
  # ALB target-group health check. The webhook serves /health; the controller
  # would otherwise probe `/`, which the signed-HTTP handler rejects.
  healthcheckPath: /health
  # Set the same value on several Ingresses to put them behind one shared ALB.
  # Empty gives this Ingress a load balancer of its own.
  groupName: ''
  host: '' # set per-env
  path: /webhook # Grafana OnCall sends POST here
  # Slack Request URL prefix — the slash-command (/slack/commands) and
  # interactivity (/slack/interactivity) endpoints. Same webhook Deployment,
  # verified with the Slack signing secret instead of the Grafana HMAC.
  slackPath: /slack

externalSecret:
  enabled: true
  secretStore: aws-secrets-manager
  refreshInterval: 1h
  # This environment's Secrets Manager tree. Every entry the chart reads sits
  # under this prefix at the suffix `scripts/seed-secrets.sh` writes it to —
  # `secrets.template.json` is the canonical inventory, and the secret-path
  # parity gate in .github/workflows/ci.yml compares the rendered chart against
  # the seeder so the two cannot drift apart.
  #
  # One secret per integration, not one bundle: they rotate on separate cadences
  # (docs/secrets.md), and landing-zone's tenant-substrate component
  # grants the tenant role GetSecretValue across `incident-response/<env>/*`.
  secretPrefix: '' # incident-response/<env>
  # Projected into the envFrom Secret: k8s env var name → path under the prefix.
  keys:
    SLACK_BOT_TOKEN: slack/bot-token
    SLACK_SIGNING_SECRET: slack/signing-secret
    GRAFANA_ONCALL_TOKEN: grafana/oncall-token
    GRAFANA_CLOUD_TOKEN: grafana/cloud-token
    GRAFANA_CLOUD_ORG_ID: grafana/cloud-org-id
    STATUSPAGE_API_KEY: statuspage/api-key
    STATUSPAGE_PAGE_ID: statuspage/page-id
    GITHUB_TOKEN: github/token
    LINEAR_API_KEY: linear/api-key
    LINEAR_PROJECT_ID: linear/project-id
    LINEAR_TEAM_ID: linear/team-id
    WORKOS_API_KEY: workos/api-key
  # Deliberately not projected. The webhook handler reads this one through the
  # pod's own GetSecretValue grant and caches it keyed on the Secrets Manager
  # VersionId (src/handlers/webhook-ingress.ts), which is what lets the HMAC
  # secret rotate without a pod restart — a projected value would only refresh
  # on the ExternalSecret interval. The chart passes the id, not the value.
  hmacSecretKey: grafana/oncall-webhook-hmac
  # No OTLP credential is projected either: the export path below targets the
  # in-cluster collector gateway receiver, which takes no authentication.

prometheusRule:
  # Ships SLO recording rules + burn-rate alerts to a Prometheus Operator
  # (kube-prometheus-stack) via the PrometheusRule CR. Off by default — inert
  # without an operator, which the managed-Prometheus stack (OpenTelemetry Collector + AMP,
  # alerts in Amazon Managed Grafana) doesn't run. Set `enabled: true` on a
  # cluster that runs one.
  enabled: false
  # Label a Prometheus operator's `spec.ruleSelector` matches on. There is no
  # such release in the eks-gitops catalog — it installs prometheus-operator-crds
  # and no ruler — so this only means something on a cluster that runs one, such
  # as the local kx cluster. Match that cluster's release name.
  selector:
    release: kube-prometheus-stack

grafanaDashboard:
  # Shipped as a GrafanaDashboard CR the grafana-operator reconciles onto the
  # external Amazon Managed Grafana — the portable path that works on both EKS
  # and the local kx cluster.
  enabled: true
  instanceSelector:
    dashboards: external
  allowCrossNamespaceImport: true
  resyncPeriod: 24h

networkPolicy:
  enabled: true

env:
  # Where this tenant's substrate lives. landing-zone provisions the
  # tenant-substrate component — DynamoDB tables, SQS queues,
  # Secrets Manager tree, EventBridge Scheduler group — in us-west-2 for all
  # three environments, so this is base rather than per-env; the source
  # defaults to the same region. A per-env deployment on a different region
  # overrides it in that environment's values file, together with the
  # tenantInfra names it goes with.
  AWS_REGION: us-west-2
  BEDROCK_MODEL_ID: anthropic.claude-sonnet-4-6
  # MCP streamable-HTTP server port — the read + draft pull surface. Matches
  # mcp.port / processor.mcpPort and the processor's mcp containerPort.
  MCP_PORT: '3002'
  LOG_LEVEL: info
  NODE_ENV: production
  # the OpenTelemetry Collector's OTLP/HTTP receiver, installed cluster-wide by eks-gitops
  # (addons/observability/otel-gateway). The Service is `telemetry` in the `monitoring`
  # namespace and exposes otlp-grpc 4317 / otlp-http 4318.
  OTEL_EXPORTER_OTLP_ENDPOINT: http://telemetry.monitoring.svc.cluster.local:4318
  OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
  OTEL_TRACES_SAMPLER: always_on
  OTEL_METRICS_EXPORTER: otlp
  OTEL_METRIC_EXPORT_INTERVAL: '60000'
  OTEL_RESOURCE_ATTRIBUTES: 'service.namespace=incident-response,service.version=0.1.0,agents.tenant=reliability,agents.platform=incident-response'

# Per-tenant infra references — populated by per-env values from the
# landing-zone tenant-substrate component's outputs (terragrunt run-all
# output -json — the chart values plumb these in at apply time).
tenantInfra:
  incidentsTableName: ''
  auditTableName: ''
  identityCacheTableName: '' # output: identity_cache_table_name
  incidentEventsQueueUrl: ''
  nudgeEventsQueueUrl: ''
  nudgeEventsQueueArn: ''
  slaCheckQueueUrl: ''
  schedulerRoleArn: ''
  schedulerGroupName: ''
  auditBucketName: '' # output: audit_bucket_name

nodeSelector: {}
tolerations: []
affinity: {}
