# Dev delta.
image:
  tag: dev

ingress:
  host: incident-response-webhook-dev.example.com

externalSecret:
  hmacSecret: incident-response/dev/grafana-oncall-hmac
  appSecret: incident-response/dev/app-secrets
  grafanaCloudSecret: incident-response/dev/grafana-cloud

env:
  OTEL_RESOURCE_ATTRIBUTES: "service.namespace=incident-response,service.version=0.1.0,deployment.environment=dev,agents.tenant=protohype,agents.platform=incident-response"

aws:
  # Fill from landing-zone `incident-response-platform` (dev) output: irsa_role_arn.
  # `cd live/aws/workload-dev/us-west-2/dev/incident-response-platform && tofu output -raw irsa_role_arn`
  platformRoleArn: ""

tenantInfra:
  # Fill the empties below from the landing-zone incident-response-platform dev
  # outputs (terragrunt output -json) — the rest of the slot names match
  # output names 1:1 (identity_cache_table_name, incident_events_queue_url,
  # nudge_events_queue_url, nudge_events_queue_arn, sla_check_queue_url,
  # scheduler_role_arn, audit_bucket_name).
  incidentsTableName: incident-response-dev-incidents
  auditTableName: incident-response-dev-audit
  identityCacheTableName: ""    # output: identity_cache_table_name
  incidentEventsQueueUrl: ""
  nudgeEventsQueueUrl: ""
  nudgeEventsQueueArn: ""
  slaCheckQueueUrl: ""
  schedulerRoleArn: ""
  schedulerGroupName: incident-response-dev-nudges
  auditBucketName: ""           # output: audit_bucket_name
