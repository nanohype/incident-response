# Staging delta.
image:
  tag: staging

ingress:
  host: incident-response-webhook-staging.example.com

externalSecret:
  secretPrefix: incident-response/staging

env:
  OTEL_RESOURCE_ATTRIBUTES: 'service.namespace=incident-response,service.version=0.1.0,deployment.environment=staging,agents.tenant=reliability,agents.platform=incident-response'

tenantInfra:
  # Fill the empties below from the landing-zone tenant-substrate staging
  # outputs (terragrunt output -json) — the rest of the slot names match
  # output names 1:1 (identity_cache_table_name, incident_events_queue_url,
  # nudge_events_queue_url, nudge_events_queue_arn, sla_check_queue_url,
  # scheduler_role_arn, audit_bucket_name).
  incidentsTableName: incident-response-staging-incidents
  auditTableName: incident-response-staging-audit
  identityCacheTableName: '' # output: identity_cache_table_name
  incidentEventsQueueUrl: ''
  nudgeEventsQueueUrl: ''
  nudgeEventsQueueArn: ''
  slaCheckQueueUrl: ''
  schedulerRoleArn: ''
  schedulerGroupName: incident-response-staging-nudges
  auditBucketName: '' # output: audit_bucket_name
