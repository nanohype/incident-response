# Platform CR — declares incident-response as a tenant of the reliability team on
# the eks-agent-platform operator. Apply once per cluster before the
# ApplicationSet entry starts reconciling the chart.
#
# Three CRs declared here:
#   - Tenant       (cluster-scoped; the reliability team the Platform belongs to)
#   - BudgetPolicy (referenced by Platform.spec.budget — required)
#   - Platform     (the actual tenant declaration)
#
# The Tenant and BudgetPolicy/Platform CRs live in different scopes: Tenant is
# cluster-scoped, the other two are namespaced into `tenants-reliability` — the
# reliability team's control-plane namespace, which holds the CRs and nothing
# else. The workloads land in a separate namespace the operator provisions.
#
# What the operator reconciles from the Platform CR:
#   - Namespace `tenants-incident-response` (Pod Security Standards baseline) —
#     derived from the Platform name, and where the chart's pods actually run
#   - ResourceQuota + LimitRange
#   - Default-deny NetworkPolicy (the chart layers app-specific rules on top)
#   - ArgoCD AppProject scoped to this Platform
#   - Per-Platform IAM role (`<env>-incident-response-tenant`) with the baseline
#     policy + spec.identity.extraPolicyArns attached and Bedrock invoke
#     clamped to spec.identity.allowedModels (bedrock-model-scoping inline
#     policy). Trust is the EKS Pod Identity service principal; SAs bind via
#     Pod Identity associations (`tenant-runtime` by the operator, the app
#     SA by landing-zone)
#
# Pod identity: the operator creates and owns the `tenant-runtime` ServiceAccount
# (shared by the webhook + processor Deployments) and binds it to the
# `<env>-incident-response-tenant` role via an EKS Pod Identity association — no
# role-arn annotation. App pods and AgentFleet pods run as it: one Platform, one
# privilege domain. Bedrock access is the agent-iam baseline clamped to
# spec.identity below; substrate access is the datastore-access policy the
# operator generates from spec.datastores, and the EventBridge Scheduler grants
# (plus the minted scheduler-invoke role) come from spec.identity.capabilities.
#
# Tenant substrate is declared, not a component: spec.datastores below names the
# three DynamoDB tables, the S3 audit archive, and the three FIFO queues; the
# generic tenant-substrate module provisions them and their DLQs, and their
# names/URLs wire into the chart's per-env values (`tenantInfra.*`).

---
apiVersion: platform.nanohype.dev/v1alpha1
kind: Tenant
metadata:
  name: reliability
  labels:
    agents.nanohype.dev/tenant: reliability
spec:
  displayName: Reliability
  primaryPersona: ops
  # Soft ceiling on the sum of every owned Platform's BudgetPolicy.monthlyUsd.
  # incident-response is the only Platform under this Tenant today.
  aggregateMonthlyBudgetUsd: '2500'
  compliance:
    soc2: true
    hipaa: false
---
apiVersion: governance.nanohype.dev/v1alpha1
kind: BudgetPolicy
metadata:
  name: incident-response
  namespace: tenants-reliability
spec:
  platformRef:
    name: incident-response
  # Soft threshold; kill-switch fires at 120% (USD 3000) when KillSwitchEnabled
  # is true. Adjust per-env if needed.
  monthlyUsd: '2500'
  alertThresholdsPercent: [50, 80, 100]
  killSwitchEnabled: true
---
apiVersion: platform.nanohype.dev/v1alpha1
kind: Platform
metadata:
  name: incident-response
  namespace: tenants-reliability
spec:
  displayName: incident-response
  persona: ops
  tenant: reliability
  budget:
    name: incident-response
  identity:
    # Bedrock model access for every pod in this Platform — app pods and
    # AgentFleet pods share the operator-reconciled `<env>-incident-response-tenant`
    # role. The operator clamps Bedrock invoke on that role to exactly these
    # IDs (bedrock-model-scoping inline policy over the baseline grant); the
    # entries match what the app's config invokes. Undated IDs cover the
    # dated snapshots the config pins (the expansion wildcards the suffix).
    allowedModels:
      - anthropic.claude-sonnet-4-6 # BEDROCK_SONNET_MODEL_ID — status drafts, postmortems
      - anthropic.claude-haiku-4-5 # BEDROCK_HAIKU_MODEL_ID — classification, checklist routing
    # Escape hatch for grants outside the datastore + capability vocabularies.
    # DDB/SQS/S3 access rides spec.datastores and the EventBridge Scheduler grants
    # ride capabilities below, so nothing is needed here.
    extraPolicyArns: []
    # Non-datastore capability: EventBridge Scheduler. The operator generates the
    # scheduler:*Schedule grants and mints the <env>-incident-response-scheduler-invoke
    # role (allowed to SendMessage to the tenant's own queues — nudges/sla) that the
    # processor passes when scheduling a nudge.
    capabilities:
      - eventBridgeScheduler
    # Secrets the pods fetch directly via the SDK rather than through the chart's
    # ExternalSecret: the Grafana OnCall HMAC secret the webhook handler reads
    # through the pod grant, keyed on VersionId so rotation lands without a pod
    # restart. Everything else is ExternalSecret-projected and needs no grant.
    # The operator grants read on exactly this secret under the tenant's own
    # incident-response/<env>/ prefix.
    directSecretReads:
      - grafana/oncall-webhook-hmac
  compliance:
    soc2: true
  isolation: namespace
  # Stateful substrate: three DynamoDB tables (incidents + audit ledger + identity
  # cache), the S3 audit archive, and three FIFO queues (incident events, nudges,
  # SLA checks) each with a dead-letter queue. The tenant-substrate module
  # provisions them and the operator generates the scoped datastore-access policy;
  # deletionPolicy defaults to Retain. Names are kept short so <platform>+<name>
  # stays within the CRD's 28-char budget.
  datastores:
    - name: incidents
      kind: keyValue
      keyValue:
        partitionKey: { name: incident_id, type: S }
        globalSecondaryIndexes:
          - name: slack-channel-index
            partitionKey: { name: channel_id, type: S }
    - name: audit
      kind: keyValue
      keyValue:
        partitionKey: { name: incident_id, type: S }
        sortKey: { name: audit_id, type: S }
        ttlAttribute: ttl
        globalSecondaryIndexes:
          - name: by-timestamp
            partitionKey: { name: timestamp, type: S }
            sortKey: { name: incident_id, type: S }
    - name: id-cache
      kind: keyValue
      keyValue:
        partitionKey: { name: external_user_id, type: S }
        ttlAttribute: ttl
    - name: archive
      kind: objectStore
    - name: events
      kind: queue
      queue: { fifo: true, maxReceiveCount: 3 }
    - name: nudges
      kind: queue
      queue: { fifo: true, maxReceiveCount: 3 }
    - name: sla
      kind: queue
      queue: { fifo: true, maxReceiveCount: 3 }
