# Platform CR — declares incident-response as a tenant of the protohype team on the
# eks-agent-platform operator. Apply once per cluster before the
# ApplicationSet entry starts reconciling the chart.
#
# Two CRs declared here:
#   - BudgetPolicy (referenced by Platform.spec.budget — required)
#   - Platform     (the actual tenant declaration)
#
# What the operator reconciles from the Platform CR:
#   - Namespace `tenants-protohype` (Pod Security Standards baseline)
#   - ResourceQuota + LimitRange
#   - Default-deny NetworkPolicy (the chart layers app-specific rules on top)
#   - ArgoCD AppProject scoped to this Platform
#   - Per-Platform IAM role (`<env>-incident-response-tenant`) with the baseline
#     policy + spec.identity.extraPolicyArns attached and Bedrock invoke
#     clamped to spec.identity.allowedModels (bedrock-model-scoping inline
#     policy). Trust is the EKS Pod Identity service principal; SAs bind via
#     Pod Identity associations (`tenant-runtime` by the operator, the app
#     SA by landing-zone)
#
# What incident-response's chart owns separately (NOT operator-reconciled):
#   - The chart's own ServiceAccount (`incident-response`) — used by both webhook and
#     processor Deployments. It is bound to the operator-reconciled
#     `<env>-incident-response-tenant` role by an EKS Pod Identity association the
#     landing-zone incident-response-platform component creates — no role-arn
#     annotation. App pods and AgentFleet pods (`tenant-runtime` SA) share that
#     role: one Platform, one privilege domain. Bedrock access on the role is
#     the agent-iam baseline clamped to spec.identity below; the app's
#     substrate grants arrive via spec.identity.extraPolicyArns.
#
# Tenant-shared infra (DDB, SQS, EventBridge Scheduler, Secrets Manager
# seeding, the app-access managed policy) — see landing-zone's
# components/aws/incident-response-platform/. Once that component's per-env entry
# applies, the outputs are wired into the chart's per-env values
# (`tenantInfra.*`).

---
apiVersion: governance.nanohype.dev/v1alpha1
kind: BudgetPolicy
metadata:
  name: incident-response
  namespace: tenants-protohype
spec:
  platformRef:
    name: incident-response
  # Soft threshold; kill-switch fires at 120% (USD 3000) when KillSwitchEnabled
  # is true. Adjust per-env if needed.
  monthlyUsd: '2500'
  alertThresholdsPercent: [50, 80, 100]
  killSwitchEnabled: true
---
apiVersion: platform.nanohype.dev/v1alpha1
kind: Platform
metadata:
  name: incident-response
  namespace: tenants-protohype
spec:
  displayName: incident-response
  persona: ops
  tenant: protohype
  budget:
    name: incident-response
  identity:
    # Bedrock model access for every pod in this Platform — app pods and
    # AgentFleet pods share the operator-reconciled `<env>-incident-response-tenant`
    # role. The operator clamps Bedrock invoke on that role to exactly these
    # IDs (bedrock-model-scoping inline policy over the baseline grant); the
    # entries match what the app's config invokes. Undated IDs cover the
    # dated snapshots the config pins (the expansion wildcards the suffix).
    allowedModels:
      - anthropic.claude-sonnet-4-6 # BEDROCK_SONNET_MODEL_ID — status drafts, postmortems
      - anthropic.claude-haiku-4-5 # BEDROCK_HAIKU_MODEL_ID — classification, checklist routing
    # The app's substrate grants (DDB, SQS, S3, EventBridge Scheduler,
    # Secrets Manager, CloudWatch) — landing-zone's incident-response-platform
    # component emits the policy as `app_access_policy_arn`. Account-scoped,
    # so it is filled per environment at apply time (landing-zone
    # docs/runbooks/model-access-cutover.md):
    #   arn:aws:iam::<account>:policy/eks-agent-platform/incident-response-<env>-app-access
    extraPolicyArns: []
  compliance:
    soc2: true
  isolation: namespace
