# incident-response ApplicationSet entry — register into nanohype/eks-gitops at
# applicationsets/apps-tenants.yaml. Matrix generator: clusters × this list.

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tenant-incident-response
  namespace: argocd
spec:
  generators:
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  argocd.argoproj.io/secret-type: cluster
          - list:
              elements:
                - name: incident-response
                  path: chart
                  syncWave: '100'
  template:
    metadata:
      name: 'incident-response-{{ index .metadata.labels "environment" }}'
      annotations:
        argocd.argoproj.io/sync-wave: '{{`{{syncWave}}`}}'
    spec:
      project: incident-response
      sources:
        - repoURL: https://github.com/nanohype/incident-response.git
          targetRevision: main
          path: '{{`{{path}}`}}'
          helm:
            valueFiles:
              - $values/{{`{{path}}`}}/values.yaml
              - $values/{{`{{path}}`}}/values-{{ index .metadata.labels "environment" }}.yaml
        - repoURL: https://github.com/nanohype/incident-response.git
          targetRevision: main
          ref: values
      destination:
        server: '{{`{{server}}`}}'
        namespace: tenants-incident-response
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=false # Platform reconciler owns the Namespace
          - ServerSideApply=true
